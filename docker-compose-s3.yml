services:
  rustfs:
    image: rustfs/rustfs:latest
    ports:
      - "${RUSTFS_PORT:-9000}:9000"
    environment:
      - RUSTFS_ACCESS_KEY=rustfsadmin
      - RUSTFS_SECRET_KEY=rustfsadmin
      - RUSTFS_ALLOW_INSECURE_DEFAULT_CREDENTIALS=true
    volumes:
      - rustfs-data:/data

volumes:
  rustfs-data: