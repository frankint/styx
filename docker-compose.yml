services:
  coordinator:
    build:
      context: .
      dockerfile: coordinator/coordinator.dockerfile
    image: dev/styx-coordinator:latest
    user: "root"
    ports:
      - "${COORDINATOR_PORT_8886:-8886}:8888"
      - "${COORDINATOR_PORT_8000:-8000}:8000"
    volumes:
      - ./raw_predictions:/usr/local/styx/raw_predictions
    environment:
      - KAFKA_URL=kafka1:19092
      - HEARTBEAT_LIMIT=5000
      - HEARTBEAT_CHECK_INTERVAL=500
      - ENABLE_AUTOSCALE=${ENABLE_AUTOSCALE:-true}
      - S3_ENDPOINT=http://rustfs:9000
      - S3_ACCESS_KEY=rustfsadmin
      - S3_SECRET_KEY=rustfsadmin
      - FORECASTER_TYPE=custom_chronos
      - FORECASTER_MAX_CONTEXT_LENGTH=1000
      # - RNN_HIDDEN_SIZE=32
    depends_on:
      - prometheus
      - grafana

  prometheus:
    image: prom/prometheus:v3.2.1
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=365d"
      - "--web.enable-admin-api"

  grafana:
    image: grafana/grafana:11.5.2-ubuntu
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true 
    volumes:
      - ./grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning 
      - ./grafana/dashboards:/etc/grafana/dashboards

  worker:
    build:
      context: .
      dockerfile: worker/worker.dockerfile
    image: dev/styx-worker:latest
    environment:
      - INGRESS_TYPE=KAFKA
      - KAFKA_URL=kafka1:19092
      - DISCOVERY_HOST=coordinator
      - DISCOVERY_PORT=8888
      - S3_ENDPOINT=http://rustfs:9000
      - S3_ACCESS_KEY=rustfsadmin
      - S3_SECRET_KEY=rustfsadmin
    depends_on:
      - coordinator

  worker-standby:
    profiles:
      - autoscale
    build:
      context: .
      dockerfile: worker/worker.dockerfile
    image: dev/styx-worker-standby:latest
    environment:
      - INGRESS_TYPE=KAFKA
      - KAFKA_URL=kafka1:19092
      - DISCOVERY_HOST=coordinator
      - DISCOVERY_PORT=8888
      - STYX_START_FILE=/tmp/styx_start
      - WORKER_STANBY=true
      - S3_ENDPOINT=http://rustfs:9000
      - S3_ACCESS_KEY=rustfsadmin
      - S3_SECRET_KEY=rustfsadmin
    depends_on:
      - coordinator

volumes:
  grafana_data:
